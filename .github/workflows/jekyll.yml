# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  repository_dispatch:
    types:
      - content-updated
      - docs-updated
# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Checkout content
        uses: actions/checkout@v4
        with:
          repository: bagelquang/bagelquant-content
          path: content
      - name: Checkout bagelquant-core
        uses: actions/checkout@v4
        with:
          repository: bagelquang/bagelquant-core
          path: external/bagelquant-core
      - name: Checkout bagelquant-data
        uses: actions/checkout@v4
        with:
          repository: bagelquang/bagelquant-data
          path: external/bagelquant-data
      - name: Checkout bagelquant-bt
        uses: actions/checkout@v4
        with:
          repository: bagelquang/bagelquant-bt
          path: external/bagelquant-bt
      - name: Collect package docs
        run: |
          mkdir -p content/docs/core
          mkdir -p content/docs/data
          mkdir -p content/docs/bt
          cp -R external/bagelquant-core/docs/. content/docs/core/
          cp -R external/bagelquant-data/docs/. content/docs/data/
          cp -R external/bagelquant-bt/docs/. content/docs/bt/
        
      - name: Setup Ruby
        # https://github.com/ruby/setup-ruby/releases/tag/v1.207.0
        uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        with:
          ruby-version: '3.1' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
